name: deploy-docs

# Run this when the main or dev branches change to ensure docs build compliance
on:
  pull_request:
    branches:
    - main
    - dev

jobs:
  deploy-docs:
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    steps:
    - uses: actions/checkout@v6

    - name: Set up Python 3.13
      uses: actions/setup-python@v6
      with:
        python-version: 3.13

    - name: Install dependencies
      run: |
        pip install -e ".[dev]"

    # Build the book
    - name: Build the book
      run: |
        jupyter-book build docs/
